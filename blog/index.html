<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Duodaa Blog</title>
<style>:root {
  --bg: #f6f9ff;
  --card: #ffffff;
  --primary: #2b6fff;
  --text: #1f2a44;
  --muted: #6b7a90;
  --border: #e6ecf5;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ===== header ===== */
header {
  background: white;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav {
  max-width: 1200px;
  margin: auto;
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
}

.nav a {
  margin-left: 16px;
  text-decoration: none;
  color: var(--muted);
  transition: 0.2s;
}

.nav a:hover {
  color: var(--primary);
}

.logo {
  color: var(--primary);
  font-weight: bold;
}

.logo * {
  *
}

/* ===== layout ===== */
.container {
  max-width: 1200px;
  margin: 30px auto;
  padding: 0 16px;
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 24px;
}

.article {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 36px;
}

.content {
  font-size: 16px;
}

.content p {
  margin: 18px 0;
}

.content h2 {
  margin-top: 36px;
  margin-bottom: 12px;
  font-size: 24px;
  padding-left: 12px;
}

.content h3 {
  margin-top: 28px;
  font-size: 20px;
}

.content a {
  color: var(--primary);
}

.content code {
  background: #eef3ff;
  padding: 2px 6px;
  border-radius: 6px;
  font-size: 14px;
}

.content pre {
  background: #0f172a;
  color: #f8fafc;
  padding: 18px;
  border-radius: 12px;
  overflow-x: auto;
  font-size: 14px;
}

.content img {
  max-width: 100%;
  border-radius: 12px;
  margin: 20px 0;
}



/* ===== post ===== */
.post {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 18px;
  transition: 0.2s;
}

.post:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
}

.post h2 {
  margin: 0 0 10px;
}

.post h2 a {
  text-decoration: none;
  color: var(--text);
}

.post p {
  color: var(--muted);
  margin: 0;
}

/* ===== sidebar ===== */
.sidebar .box {
  background: white;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
}

/* ====== 近期文章 ====== */

.list {
  list-style: none;
  padding: 0;
  margin: 0;
}

.list li {
  border-bottom: 1px dashed var(--border);
}

.list li:last-child {
  border-bottom: none;
}

.list a {
  display: block;
  padding: 10px 0;
  color: var(--text);
  text-decoration: none;
  font-size: 14px;
  transition: 0.2s;
}

.list a:hover {
  color: var(--primary);
  padding-left: 4px;
}

.archive-title{
  font-size:30px;
  margin-bottom:30px;
}

.archive-list{
  display:flex;
  flex-direction:column;
}

.archive-item{
  display:flex;
  align-items:center;

  gap:24px;

  padding:16px 0;

  border-bottom:1px solid var(--border);
}

.archive-date{
  width:180px;

  color:var(--muted);

  font-size:14px;

  flex-shrink:0;
}

.archive-link{
  text-decoration:none;

  color:var(--text);

  font-size:18px;
  font-weight:500;

  transition:.2s;
}

.archive-link:hover{
  color:var(--primary);
}


.back{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin-top:36px;
  text-decoration:none;
  color:var(--primary);
  font-size:15px;
  font-weight:500;
  transition:.2s;
}

.back:hover{
  opacity:.8;
  transform:translateX(-2px);
}

/* ===== 上一篇 / 下一篇 ===== */

.nav-posts{

  margin-top:40px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.nav-posts a{

  display:flex;
  align-items:center;
  min-height:20px;
  padding:5px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  text-decoration:none;
  color:var(--text);
  line-height:1.6;
  transition:.2s;
}

.nav-posts a:hover{

  border-color:var(--primary);
  transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(43,111,255,.08);
}

/* 上一篇 */

.prev{
  justify-content:flex-start;
  text-align:left;
}

/* 下一篇 */

.next{
  justify-content:flex-end;
  text-align:right;
}


/* responsive */
@media (max-width: 900px) {
  .container {
    grid-template-columns: 1fr;
  }
   .archive-item{
    gap:14px;
  }

  .archive-link{
    font-size:16px;
  }
}</style>
</head>
